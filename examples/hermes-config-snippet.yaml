# Example Hermes Agent config snippet.
# Merge these top-level keys into your ~/.hermes/config.yaml.
#
# Assumes vertex-proxy is running on 127.0.0.1:8787 (default).

custom_providers:
  - name: vertex-anthropic
    base_url: http://127.0.0.1:8787/anthropic
    transport: anthropic_messages

  - name: vertex-gemini
    # Note: Hermes doesn't have a native Gemini transport. Use this custom
    # provider only if you've set Hermes up with an openai-chat-compat layer,
    # or if you've added a Gemini transport locally.
    base_url: http://127.0.0.1:8787/gemini
    transport: openai_chat

  - name: vertex-maas
    base_url: http://127.0.0.1:8787/openai
    transport: openai_chat

# All-Gemini fallback: stays on GCP credit coverage (first-party billing, not
# Marketplace). Different quota pool from Flash primary, so quota exhaustion
# still fails over cleanly.
fallback_model:
  provider: vertex-gemini
  model: gemini-2.5-pro

# Alternative: Claude Haiku 4.5 on Vertex. Higher quality, but billed via
# GCP Marketplace, so promotional credits typically don't apply. Uncomment
# if you have a billing account that can absorb the cash cost.
# fallback_model:
#   provider: vertex-anthropic
#   model: claude-haiku-4-5-20250929

# Alternative: cheaper MaaS model (also Marketplace-billed in most cases).
# fallback_model:
#   provider: vertex-maas
#   model: kimi-k2.5
